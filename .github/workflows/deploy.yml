name: Dashboard CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: rotary-dashboard-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.44.4"

jobs:
  build:
    name: 🏗️ Build & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Build production bundle
        run: |
          echo "🏗️ Building production bundle..."
          flutter build web --release \
            --dart-define=API_BASE_URL=${{ vars.API_BASE_URL || 'http://localhost:8000' }}
          echo "✅ Build successful"

      - name: Verify build output
        run: |
          if [ -d "build/web" ] && [ -f "build/web/index.html" ]; then
            echo "✅ build/web/index.html exists"
            du -sh build/web/
          else
            echo "❌ Build output missing!"
            exit 1
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-dist
          path: build/web/
          retention-days: 7

  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dashboard-dist
          path: build/web

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Sync build to server
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts
          rsync -avz --delete build/web/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/rotary-admin-dashboard/

      - name: Fix permissions & reload nginx
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} '
            set -e
            # Keep files owned by the deploy user (not nginx) so the next
            # rsync can overwrite them without needing sudo — nginx only
            # needs read access, granted below via chmod + SELinux context.
            sudo chmod -R 755 /var/www/rotary-admin-dashboard
            sudo chcon -R -t httpd_sys_content_t /var/www/rotary-admin-dashboard || true
            sudo nginx -t
            sudo systemctl reload nginx
            echo "✅ Rotary Admin Dashboard deployed"
          '
